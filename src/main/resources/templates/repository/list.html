<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>repository</title>
</head>
<body>
<ul>
    <li th:each="repository : ${user.getRepositories()}">
        <a th:href="'/repository/'+${user.getLogin()}+'/'+${repository.getName()}" th:text="${repository.getName()}"></a>
    </li>
</ul>
</body>
</html>
